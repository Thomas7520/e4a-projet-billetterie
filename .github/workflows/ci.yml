name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Client — lint, build, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Build
        working-directory: client
        run: npm run build

      - name: Tests
        working-directory: client
        run: npm test

  server:
    name: Serveur — tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install
        working-directory: server
        run: npm ci

      - name: Tests
        working-directory: server
        run: npm test

  sonarcloud:
    name: SonarCloud - analyse qualité
    runs-on: ubuntu-latest
    needs: [client, server]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=thomas7520
            -Dsonar.projectKey=Thomas7520_e4a-projet-billetterie
            -Dsonar.sources=client/src,server
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,server/seed-concerts.js
            -Dsonar.javascript.lcov.reportPaths=client/coverage/lcov.info
